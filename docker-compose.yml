services:
  postgres:
    image: postgres:16-alpine
    container_name: deploywatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deploywatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deploywatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: deploywatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deploywatch-backend-migrate
    restart: "no"
    command: ["npm", "run", "prisma:push"]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/deploywatch?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-deploywatch-local-secret-key}
      JWT_EXPIRES_IN: 7d
      MONITORING_DISPATCHER_INTERVAL_MS: 60000
      MONITORING_BATCH_LIMIT: 100
      HTTP_REQUEST_TIMEOUT_MS: 10000
      EMAIL_FROM: alerts@deploywatch.local
      API_BASE_URL: http://backend:4000
    depends_on:
      postgres:
        condition: service_healthy
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deploywatch-backend
    restart: unless-stopped
    command: ["node", "dist/server.js"]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/deploywatch?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-deploywatch-local-secret-key}
      JWT_EXPIRES_IN: 7d
      MONITORING_DISPATCHER_INTERVAL_MS: 60000
      MONITORING_BATCH_LIMIT: 100
      HTTP_REQUEST_TIMEOUT_MS: 10000
      EMAIL_FROM: alerts@deploywatch.local
      API_BASE_URL: http://backend:4000
      PRISMA_CLIENT_ENGINE_TYPE: library
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deploywatch-worker
    restart: unless-stopped
    command: ["node", "dist/workers/index.js"]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/deploywatch?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-deploywatch-local-secret-key}
      JWT_EXPIRES_IN: 7d
      MONITORING_DISPATCHER_INTERVAL_MS: 60000
      MONITORING_BATCH_LIMIT: 100
      HTTP_REQUEST_TIMEOUT_MS: 10000
      EMAIL_FROM: alerts@deploywatch.local
      API_BASE_URL: http://backend:4000
      PRISMA_CLIENT_ENGINE_TYPE: library
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deploywatch-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
